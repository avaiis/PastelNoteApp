<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archive – Pastel Note</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">
  <aside id="sidebar" class="w-56 shrink-0 bg-white h-full shadow-sm overflow-y-auto"></aside>
  <div class="flex flex-col flex-1 overflow-hidden">
    <header id="topbar" class="bg-white border-b border-gray-100 px-8 py-4 flex items-center shrink-0"></header>
    <main class="flex-1 overflow-y-auto px-8 py-6">
      <div id="loadingState" class="flex items-center justify-center h-40">
        <p class="text-gray-400 text-sm animate-pulse">Load notes...</p>
      </div>
      <div id="emptyState" class="hidden flex-col items-center justify-center h-40 text-center">
        <p class="text-2xl mb-2">📦</p>
        <p class="text-gray-400 text-sm">Empty archive.</p>
      </div>
      <div id="notesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>
  </div>

  <!-- Edit modal -->
  <div id="noteModal" 
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">

      <h3 class="text-xl font-bold text-gray-800 mb-4">Edit Note</h3>
      
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-2">Current mood</label>
          <div id="moodPicker" class="flex gap-2"></div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Title here</label>
          <input id="inputTitle" type="text" placeholder="Note title..." class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Your notes</label>
          <textarea id="inputContent" rows="4" placeholder="Write your notes here..." class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Category</label>
          <select id="inputCategory" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition bg-white">
            <option value="College">College</option><option value="Work">Work</option>
            <option value="Personal">Personal</option><option value="Idea">Idea</option><option value="Other">Other</option>
          </select>
        </div>
        <p id="modalError" class="text-red-500 text-xs hidden">The title field must be filled in.</p>
      </div>
      <div class="flex gap-3 mt-5">
        <button id="btnCancelModal" class="flex-1 border border-gray-200 text-gray-600 font-medium py-2.5 rounded-xl text-sm hover:bg-gray-50 transition">Cancel</button>
        <button id="btnSaveModal" class="flex-1 bg-[#9277C0] hover:bg-[#8165AE] text-white font-semibold py-2.5 rounded-xl text-sm transition">Save</button>
      </div>
    </div>
  </div>
  <script type="module" src="../js/archive.js"></script>
</body>
</html>

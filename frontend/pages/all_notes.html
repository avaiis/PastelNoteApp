<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Notes – Pastel Note</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    #notesGrid::-webkit-scrollbar { width: 4px; }
    #notesGrid::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    #readContent { white-space: pre-wrap; }
    .read-scroll::-webkit-scrollbar { width: 4px; }
    .read-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

  <aside id="sidebar" class="w-56 shrink-0 bg-white h-full shadow-sm overflow-y-auto"></aside>

  <div class="flex flex-col flex-1 overflow-hidden">
    <header id="topbar" class="bg-white border-b border-gray-100 px-8 py-4 flex items-center shrink-0"></header>
    <main class="flex-1 overflow-y-auto px-8 py-6">
      <div id="loadingState" class="flex items-center justify-center h-40">
        <p class="text-gray-400 text-sm animate-pulse">Loading notes...</p>
      </div>
      <div id="emptyState" class="hidden flex-col items-center justify-center h-40 text-center">
        <p class="text-gray-400 text-sm">No notes yet. Create your first one!</p>
      </div>
      <div id="notesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>
  </div>

  <!-- Read modal -->
  <div id="readModal"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden flex flex-col max-h-[85vh]">

      <!-- Accent bar: warna otomatis sesuai kategori note -->
      <div id="readAccent" class="px-6 pt-5 pb-4">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-2 flex-wrap">
            <span id="readMood" class="text-2xl leading-none"></span>
            <span id="readCategory"
              class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full text-gray-600">
            </span>
          </div>
          <button id="readCloseBtn"
            class="shrink-0 w-7 h-7 rounded-full bg-black/10 hover:bg-black/20 flex items-center justify-center transition text-gray-600 text-xs font-bold">
            ✕
          </button>
        </div>
        <h2 id="readTitle" class="text-xl font-bold text-gray-800 mt-3 leading-snug"></h2>
        <p id="readDate" class="text-xs text-gray-400 mt-1"></p>
      </div>

      <!-- Konten scrollable -->
      <div class="flex-1 overflow-y-auto read-scroll px-6 py-4 border-t border-gray-100">
        <p id="readContent" class="text-sm text-gray-700 leading-relaxed"></p>
      </div>

      <!-- Action bar bawah -->
      <div class="px-6 py-4 border-t border-gray-100 flex items-center gap-3">
        <button id="readFavBtn"
          class="flex items-center gap-1.5 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-50 transition text-gray-500 text-sm">
        </button>
        <div class="flex-1"></div>
        <button id="readEditBtn"
          class="flex items-center gap-1.5 px-4 py-2 bg-[#9277C0] hover:bg-[#8165AE] text-white text-sm font-semibold rounded-xl transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          Edit
        </button>
      </div>
    </div>
  </div>

  <!-- Create modal -->
  <div id="noteModal"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">

      <div class="flex items-center justify-between w-full mb-4">
        <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Create New Note</h3>
        <span id="modalBadge" class="text-[10px] px-2 py-0.5 rounded-full font-medium bg-blue-100 text-blue-600">Draft</span>
      </div>

      <div class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-2">Current mood</label>
          <div id="moodPicker" class="flex gap-2"></div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Title</label>
          <input id="inputTitle" type="text" placeholder="Note title..."
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Your notes</label>
          <textarea id="inputContent" rows="4" placeholder="Write your notes here..."
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Category</label>
          <select id="inputCategory"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition bg-white">
            <option value="College">College</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="Idea">Idea</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <p id="modalError" class="text-red-500 text-xs hidden">The title field must be filled in.</p>
      </div>

      <div class="flex gap-3 mt-5">
        <button id="btnCancelModal"
          class="flex-1 border border-gray-200 text-gray-600 font-medium py-2.5 rounded-xl text-sm hover:bg-gray-50 transition">
          Cancel
        </button>
        <button id="btnSaveModal"
          class="flex-1 bg-[#9277C0] hover:bg-[#8165AE] text-white font-semibold py-2.5 rounded-xl text-sm transition">
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button id="btnNewNote" title="Create new note"
    class="fixed bottom-8 right-8 w-14 h-14 bg-[#9277C0] hover:bg-[#8165AE] text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition z-40">
    +
  </button>

  <script type="module" src="../js/all_notes.js"></script>
</body>
</html>

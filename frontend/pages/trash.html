<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trash – Pastel Note</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">
  <aside id="sidebar" class="w-56 shrink-0 bg-white h-full shadow-sm overflow-y-auto"></aside>
  <div class="flex flex-col flex-1 overflow-hidden">
    <header id="topbar" class="bg-white border-b border-gray-100 px-8 py-4 flex items-center shrink-0"></header>
    <main class="flex-1 overflow-y-auto px-8 py-6">
      <!-- Banner info -->
      <div class="bg-red-50 border border-red-100 rounded-xl px-4 py-3 mb-5 flex items-center gap-2 text-sm text-red-500">
        <span>⚠️</span>
        <span>Items in the trash will be permanently deleted. Restore them first if you still need them..</span>
      </div>
      <div id="loadingState" class="flex items-center justify-center h-40">
        <p class="text-gray-400 text-sm animate-pulse">Load notes...</p>
      </div>
      <div id="emptyState" class="hidden flex-col items-center justify-center h-40 text-center">
        <p class="text-2xl mb-2">🗑️</p>
        <p class="text-gray-400 text-sm">Trash is empty. It's clean!</p>
      </div>
      <div id="notesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>
  </div>
  <script type="module" src="../js/trash.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .right-panel {
      background: linear-gradient(160deg, #b07fe0 0%, #7c4dbc 60%, #6c3aad 100%);
    }
    input:focus { outline: none; }
    .fade-in { animation: fadeInUp 0.5s ease both; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.12s; }
    .stagger-3 { animation-delay: 0.19s; }
    .stagger-4 { animation-delay: 0.26s; }
    .stagger-5 { animation-delay: 0.33s; }
  </style>
</head>
<body class="h-screen flex bg-gray-50 font-sans">

  <!-- Left: Form panel (~7/12) -->
  <div class="flex flex-col justify-center bg-white flex-1 px-10 md:px-20 py-14">
    <div class="max-w-md w-full mx-auto">
      <h1 class="text-3xl font-bold text-gray-900 mb-8 fade-in text-center">Welcome Back</h1>

      <form id="loginForm" novalidate class="space-y-5">

        <!-- Username -->
        <div class="fade-in stagger-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" placeholder="e.g. rashstudyy"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"/>
          <p class="text-red-500 text-xs mt-1 hidden" id="usernameError">Username is required.</p>
        </div>

        <!-- Password -->
        <div class="fade-in stagger-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" placeholder="Enter your password"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 pr-11 text-sm text-gray-800 placeholder-gray-400 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"/>
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-violet-500 transition cursor-pointer">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p class="text-red-500 text-xs mt-1 hidden" id="passwordError">Password is required.</p>
        </div>

        <!-- Forgot password -->
        <div class="fade-in stagger-3 flex justify-end">
          <a href="#" class="text-sm font-medium text-[#684B9B] hover:underline">Forgot password?</a>
        </div>

        <!-- Submit -->
        <div class="fade-in stagger-4">
          <button type="submit" id="submitBtn"
            class="w-full bg-[#9277C0] hover:bg-[#8165AE] active:bg-[#71549C] text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-md hover:shadow-violet-200 hover:shadow-lg text-sm">
            Login
          </button>
        </div>

        <!-- Register link -->
        <p class="fade-in stagger-5 text-center text-sm text-gray-500">
          Don't have an account?
          <a href="register.html" class="text-[#684B9B] font-medium hover:underline ml-1">Sign up here</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Right: Purple panel (~5/12) -->
  <div class="right-panel hidden md:flex flex-col items-center justify-center" style="width:41.666%">
    <img src="../assets/login.png" alt="Login Illustration" class="w-3/4 h-auto object-contain drop-shadow-xl"/>
  </div>

  <!-- Success overlay -->
  <div id="successOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-2xl p-8 shadow-2xl text-center max-w-sm mx-4">
      <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-2">Login Successful!</h2>
      <p class="text-gray-500 text-sm">Welcome back! Preparing your dashboard...</p>
      <div class="w-full bg-gray-100 rounded-full h-1.5 mt-4">
        <div id="progressBar" class="bg-[#9277C0] h-1.5 rounded-full w-0 transition-all duration-[2000ms]"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { login } from '../js/api.js';
    import { saveUser } from '../js/auth.js';

    const loginForm = document.getElementById('loginForm');

    // Toggle password
    document.getElementById('togglePassword').addEventListener('click', () => {
      const p = document.getElementById('password');
      const isPass = p.type === 'password';
      p.type = isPass ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = isPass
        ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    });

    // 2. Handle Login Form
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    
    // Element error
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');

    // Reset error
    [usernameError, passwordError].forEach(el => el?.classList.add('hidden'));

    let isFormValid = true;

    // Validasi Lokal
    if (!usernameInput.value.trim()) {
      if(usernameError) { usernameError.textContent = "Username is required"; usernameError.classList.remove('hidden'); }
      isFormValid = false;
    }
    if (!passwordInput.value) {
      if(passwordError) { passwordError.textContent = "Password is required"; passwordError.classList.remove('hidden'); }
      isFormValid = false;
    }

    if (!isFormValid) return;

    try {
      const result = await login(
        usernameInput.value.trim(), 
        passwordInput.value);

      console.log("Data from backend:", result);

      if (result && result.user) {
        localStorage.setItem('user', JSON.stringify(result.user));

        // Jalankan animasi sukses atau langsung pindah halaman
        document.getElementById('successOverlay')?.classList.remove('hidden');
        setTimeout(() => document.getElementById('progressBar').style.width = '100%', 50);
        setTimeout(() => {
          window.location.href = 'all_notes.html';
        }, 2700);
      } else {
        alert("User data was not found in the response.");
      }
    } catch (error) {
      const msg = error.message.toLowerCase();

      // Cek apakah errornya urusan password atau bukan
      if (msg.includes('password')) {
        passwordError.textContent = error.message;
        passwordError.classList.remove('hidden');
      } else {
        // Jika username tidak ditemukan atau error umum lainnya
        usernameError.textContent = error.message;
        usernameError.classList.remove('hidden');
      }
    }
  });
  </script>
</body>
</html>
